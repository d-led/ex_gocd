# OpenTelemetry Collector configuration for ex_gocd observability stack
# Receives OTLP traces from ex_gocd server, exports to Jaeger + Prometheus metrics.
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  memory_limiter:
    check_interval: 5s
    limit_mib: 512
  attributes:
    actions:
      - key: deployment.environment
        action: upsert
        value: "dev"

exporters:
  # Export traces to Jaeger via OTLP gRPC (port 4317)
  otlp:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # Export metrics to Prometheus (scraped by Grafana)
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: ex_gocd
  # Also log to stdout for debugging
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, attributes, batch]
      exporters: [otlp, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, attributes, batch]
      exporters: [prometheus, debug]
