services:

  postgres:
    image: postgres:18-alpine
    ports:
      - 5432:5432
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - PGDATA=/var/lib/postgresql/data/pgdata
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "maintenance_work_mem=64MB"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10
    volumes:
      - data-postgres:/var/lib/postgresql/data

  # http://localhost:8092/?pgsql=postgres&username=postgres&db=postgres&ns=public
  adminer:
    image: adminer
    links:
      - postgres
    ports:
      - 8092:8080

  # ---------------------------------------------------------------------------
  # Observability stack: OTel Collector → Jaeger + Grafana
  # ---------------------------------------------------------------------------

  # OpenTelemetry Collector — receives OTLP from ex_gocd, exports to Jaeger
  # http://localhost:4318 (OTLP HTTP), http://localhost:4317 (OTLP gRPC)
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    platform: linux/amd64
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./otel/collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics
    depends_on:
      - jaeger

  # Jaeger — distributed tracing backend and UI
  # http://localhost:16686/search
  jaeger:
    image: jaegertracing/all-in-one:latest
    platform: linux/amd64
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=50000
    ports:
      - "16686:16686"  # UI

  # Grafana — observability dashboards
  # http://localhost:3000 (anonymous Editor access, pre-configured dashboards)
  grafana:
    image: grafana/grafana:latest
    platform: linux/amd64
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning/:/etc/grafana/provisioning/
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
    environment:
      GF_RENDERING_SERVER_URL: http://renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
      GF_RENDERING_RENDERER_TOKEN: ex-gocd-renderer-token
      GF_LOG_FILTERS: rendering:debug
    depends_on:
      - jaeger
      - renderer
      - loki

  # Grafana Image Renderer — for PDF/PNG report rendering
  renderer:
    image: grafana/grafana-image-renderer:latest
    platform: linux/amd64
    container_name: grafana-image-renderer
    ports:
      - "3081:8081"
    environment:
      ENABLE_METRICS: "true"
      RENDERER_TOKEN: ex-gocd-renderer-token

  # ---------------------------------------------------------------------------
  # Logging: Fluent Bit → Loki
  # ---------------------------------------------------------------------------

  # Fluent Bit — tails host log files, forwards to Loki
  fluentbit:
    image: grafana/fluent-bit-plugin-loki:3.7.2
    platform: linux/amd64
    container_name: fluentbit
    volumes:
      - ./fluentbit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf
      - /tmp:/host-logs:ro
    environment:
      - LOKI_URL=http://loki:3100/loki/api/v1/push

  # Loki — log aggregation backend
  loki:
    image: grafana/loki:3.7.2
    platform: linux/amd64
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    depends_on:
      - fluentbit

  # ---------------------------------------------------------------------------
  # Email: smtp4dev — local SMTP server + Web UI for dev email testing
  # SMTP: localhost:2525  Web UI: http://localhost:8025
  # ---------------------------------------------------------------------------
  smtp4dev:
    image: rnwood/smtp4dev:latest
    platform: linux/amd64
    container_name: smtp4dev
    ports:
      - "2525:25"    # SMTP
      - "8025:80"    # Web UI
      - "1433:143"   # IMAP (optional)
    environment:
      - ServerOptions__HostName=smtp4dev
      - ServerOptions__TlsMode=None
    volumes:
      - smtp4dev-data:/smtp4dev
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kubernetes (k3s) — for elastic agent development/testing
  # API: https://localhost:6443  Token: see /var/lib/rancher/k3s/server/node-token
  # ---------------------------------------------------------------------------

  k3s:
    image: rancher/k3s:v1.31.5-k3s1
    platform: linux/amd64
    container_name: k3s
    privileged: true
    command: server --disable traefik --disable servicelb --secrets-encryption=false --kubelet-arg=--seccomp-default=false
    ports:
      - "6443:6443"
    volumes:
      - k3s-server:/var/lib/rancher/k3s
      - /tmp/k3s-kubeconfig:/output
    environment:
      - K3S_TOKEN=exgocd-demo-token
      - K3S_KUBECONFIG_OUTPUT=/output/kubeconfig.yaml
      - K3S_KUBECONFIG_MODE=666

volumes:
  data-postgres:
  smtp4dev-data:
  k3s-server: