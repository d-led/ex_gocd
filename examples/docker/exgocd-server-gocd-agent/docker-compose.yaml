# Example 3: ex_gocd server with official GoCD Java agent
#
# Our Phoenix server with the official gocd/gocd-agent-alpine container.
# The Java agent auto-registers with our server.
# Access ex_gocd dashboard at http://localhost:4003

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ex_gocd_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ex-gocd-server:
    build:
      context: ../../..
      dockerfile: Dockerfile
    ports:
      - '4003:4000'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "ecto://postgres:postgres@postgres/ex_gocd_prod"
      SECRET_KEY_BASE: "demo-secret-key-base-do-not-use-in-production"
      PHX_HOST: "localhost"
      PORT: "4000"
    volumes:
      - exgocd_artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/version"]
      interval: 10s
      timeout: 5s
      retries: 5

  gocd-java-agent:
    image: gocd/gocd-agent-alpine:latest
    depends_on:
      - ex-gocd-server
    environment:
      GO_SERVER_URL: "http://ex-gocd-server:4000/go"
      AGENT_AUTO_REGISTER_KEY: "ex-gocd-demo-cookie"
      AGENT_AUTO_REGISTER_RESOURCES: "java,alpine"
      AGENT_AUTO_REGISTER_ENVIRONMENTS: "staging"
      AGENT_BOOTSTRAPPER_AGENT_LAUNCHER_PROPERTIES: "/dev/null"

volumes:
  pgdata:
  exgocd_artifacts:
