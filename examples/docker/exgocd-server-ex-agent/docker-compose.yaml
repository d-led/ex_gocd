# Example 2: ex_gocd server with ex_gocd Go agent
#
# Full ex_gocd stack: our Phoenix server + PostgreSQL + our Go agent.
# Access ex_gocd dashboard at http://localhost:4002

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ex_gocd_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ex-gocd-server:
    image: ghcr.io/d-led/ex_gocd:latest
    build:
      context: ../../..
      dockerfile: Dockerfile
    ports:
      - '4002:4000'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "ecto://postgres:postgres@postgres/ex_gocd_prod"
      SECRET_KEY_BASE: "demo-secret-key-base-do-not-use-in-production"
      PHX_HOST: "localhost"
      PORT: "4000"
    volumes:
      - exgocd_artifacts:/app/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/version"]
      interval: 10s
      timeout: 5s
      retries: 5

  ex-gocd-agent:
    image: ghcr.io/d-led/ex_gocd-agent:latest
    build:
      context: ../../../agent
      dockerfile: Dockerfile
    depends_on:
      ex-gocd-server:
        condition: service_healthy
    environment:
      AGENT_SERVER_URL: "http://ex-gocd-server:4000"
      EX_GOCD_DEMO_COOKIE: "ex-gocd-demo-cookie"
      AGENT_AUTO_REGISTER_KEY: "ex-gocd-demo-cookie"
      AGENT_AUTO_REGISTER_RESOURCES: "go,linux"

volumes:
  pgdata:
  exgocd_artifacts:
