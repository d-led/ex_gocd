# Example 1: Official GoCD server with ex_gocd Go agent
#
# Starts the official gocd/gocd-server container and our Go-based agent.
# The agent auto-registers with the GoCD server.
# Access GoCD dashboard at http://localhost:8153

services:
  go-server:
    image: gocd/gocd-server:v25.4.0
    ports:
      - '8153:8153'
      - '8154:8154'
    volumes:
      - godata:/godata
      - gohome:/home/go
      - ./gocd-config/cruise-config.xml:/godata/config/cruise-config.xml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8153/go/api/support"]
      interval: 30s
      timeout: 10s
      retries: 10

  ex-gocd-agent:
    image: ghcr.io/d-led/ex_gocd-agent:latest
    build:
      context: ../../../agent
      dockerfile: Dockerfile
    depends_on:
      go-server:
        condition: service_healthy
    environment:
      AGENT_SERVER_URL: "http://go-server:8153/go"
      EX_GOCD_DEMO_COOKIE: "ex-gocd-demo-cookie"
      AGENT_AUTO_REGISTER_KEY: "123456789abcdef"
      AGENT_AUTO_REGISTER_RESOURCES: "go,linux"
      AGENT_AUTO_REGISTER_ENVIRONMENTS: "staging"

volumes:
  godata:
  gohome:
