version: "0.5"

# ── ex_gocd clustered process-compose configuration ────────────────────
# Starts 2 Phoenix instances in a libcluster-based OTP cluster.
# Gossip auto-discovery — NO seed nodes needed on loopback.
#
# Pattern copied from ssr-robust-live-svg and
# independent_liveview_components_experiment.
#
# Prerequisites: docker compose up -d postgres jaeger otel-collector
# Usage:         process-compose -f process-compose.cluster.yaml up
# Stop:          process-compose -f process-compose.cluster.yaml down

log_location: /tmp/ex_gocd_cluster.log
log_level: info
is_strict: true

processes:
  # ── Phoenix Server :4000 ────────────────────────────────────────────
  server-4000:
    command: "elixir --name ex_gocd@127.0.0.1 --cookie ex-gocd-demo-cookie -S mix phx.server"
    working_dir: "."
    environment:
      - "PORT=4000"
      - "EX_GOCD_CLUSTER=1"
      - "MIX_ENV=dev"
      - "PLUGIN_SECRET=ex-gocd-demo-secret"
    availability:
      restart: always

  # ── Phoenix Server :4050 ────────────────────────────────────────────
  server-4050:
    command: "elixir --name ex_gocd2@127.0.0.1 --cookie ex-gocd-demo-cookie -S mix phx.server"
    working_dir: "."
    environment:
      - "PORT=4050"
      - "EX_GOCD_CLUSTER=1"
      - "MIX_ENV=dev"
      - "PLUGIN_SECRET=ex-gocd-demo-secret"
    availability:
      restart: always

  # ── Plugin: RegionalAffinity (AgentSelector) ────────────────────────
  plugin-regional-affinity-4100:
    command: "elixir --name regional_affinity@127.0.0.1 --cookie ex-gocd-demo-cookie -S mix phx.server"
    working_dir: "plugins/managed/regional_affinity"
    environment:
      - "PORT=4100"
      - "MIX_ENV=dev"
      - "PLUGIN_SECRET=ex-gocd-demo-secret"
    availability:
      restart: always

  # ── Plugin: SimpleOrgChart (OrgHierarchy) ───────────────────────────
  plugin-org-chart-4101:
    command: "elixir --name simple_org_chart@127.0.0.1 --cookie ex-gocd-demo-cookie -S mix run --no-halt"
    working_dir: "plugins/managed/simple_org_chart"
    environment:
      - "PORT=4101"
      - "MIX_ENV=dev"
      - "PLUGIN_SECRET=ex-gocd-demo-secret"
    availability:
      restart: always

  # ── Plugin: CorpPolicy (AgentSelector) ──────────────────────────────
  plugin-corp-policy-4102:
    command: "elixir --name corp_policy@127.0.0.1 --cookie ex-gocd-demo-cookie -S mix run --no-halt"
    working_dir: "plugins/managed/corp_policy"
    environment:
      - "PORT=4102"
      - "MIX_ENV=dev"
      - "PLUGIN_SECRET=ex-gocd-demo-secret"
    availability:
      restart: always

  # ── CI Agent (elixir, postgres resources) ───────────────────────────
  ci-agent:
    command: "go run ."
    working_dir: "agent"
    environment:
      - "AGENT_SERVER_URL=http://127.0.0.1:4000"
      - "AGENT_WORK_DIR=/tmp/ex_gocd_agent_work"
      - "AGENT_CI_MODE=1"
      - "AGENT_AUTO_REGISTER_RESOURCES=elixir,postgres"
      - "AGENT_HOSTNAME=ci-agent"
      - "AGENT_UUID=00010000-1000-4000-a000-000000000001"
      - "EX_GOCD_DEMO_COOKIE=ex-gocd-demo-cookie"
      - "OTEL_TRACES_EXPORTER=otlp"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=localhost:4318"
      - "OTEL_SERVICE_NAME=gocd-agent"
    availability:
      restart: always

  # ── Docker Agent (docker resource) ──────────────────────────────────
  docker-agent:
    command: "go run ."
    working_dir: "agent"
    environment:
      - "AGENT_SERVER_URL=http://127.0.0.1:4000"
      - "AGENT_WORK_DIR=/tmp/ex_gocd_agent_docker_work"
      - "AGENT_AUTO_REGISTER_RESOURCES=docker"
      - "AGENT_HOSTNAME=docker-agent"
      - "AGENT_UUID=00020000-2000-4000-a000-000000000001"
      - "EX_GOCD_DEMO_COOKIE=ex-gocd-demo-cookie"
      - "OTEL_TRACES_EXPORTER=otlp"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=localhost:4318"
      - "OTEL_SERVICE_NAME=gocd-docker-agent"
    availability:
      restart: always

  # ── Elastic Docker Agent (self-terminates when idle) ────────────────
  elastic-docker-agent:
    command: "go run ."
    working_dir: "agent"
    environment:
      - "AGENT_SERVER_URL=http://127.0.0.1:4000"
      - "AGENT_WORK_DIR=/tmp/ex_gocd_agent_docker_elastic_work"
      - "AGENT_AUTO_REGISTER_ELASTIC_AGENT_ID=elastic-docker-001"
      - "AGENT_AUTO_REGISTER_ELASTIC_PLUGIN_ID=cd.go.contrib.elastic-agent.docker"
      - "AGENT_AUTO_REGISTER_RESOURCES="
      - "AGENT_IDLE_TIMEOUT=300s"
      - "AGENT_HOSTNAME=elastic-docker-agent"
      - "AGENT_UUID=00030000-3000-4000-a000-000000000001"
      - "EX_GOCD_DEMO_COOKIE=ex-gocd-demo-cookie"
      - "OTEL_TRACES_EXPORTER=otlp"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=localhost:4318"
      - "OTEL_SERVICE_NAME=gocd-elastic-docker-agent"
    availability:
      restart: always
