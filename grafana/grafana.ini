[server]
http_port = 3000
domain = localhost

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Editor

[users]
allow_sign_up = false
allow_org_create = false

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/ci-observability/pipeline-observability.json

[security]
allow_embedding = true

[feature_toggles]
publicDashboards = true

[log]
level = info

[rendering]
server_url = http://renderer:8081/render
callback_url = http://grafana:3000/
