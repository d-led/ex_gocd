name: E2E Scale & Performance Test

on:
  workflow_dispatch:
    inputs:
      agent_count:
        description: 'Number of simulated agents to spawn'
        required: true
        default: '100'
        type: string

permissions:
  contents: read
  checks: write

jobs:
  e2e-perf-test:
    name: Run E2E Scale & Performance Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - run: docker compose version

      - run: bash scripts/run_perf_test.sh --build
        env:
          AGENT_COUNT: ${{ github.event.inputs.agent_count || '100' }}

      - name: Publish Performance Summary
        if: always()
        run: |
          if [ -f perf-summary.md ]; then
            cat perf-summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3.0.0
        if: always()
        with:
          name: E2E Performance Tests
          path: e2e-report.xml
          reporter: java-junit
