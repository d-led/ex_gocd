# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Elixir CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  checks: write

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ex_gocd_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v7
    - name: Set up Elixir
      uses: erlef/setup-beam@v1
      with:
        elixir-version: '1.20.1' # [Required] Define the Elixir version
        otp-version: '29.0'      # [Required] Define the Erlang/OTP version

    - name: Restore dependencies cache
      uses: actions/cache@v6
      with:
        path: deps
        key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
        restore-keys: ${{ runner.os }}-mix-
    - name: Install dependencies
      run: mix deps.get
    - name: Compile (force, to avoid stale beam warnings)
      run: mix compile --force --warnings-as-errors
      env:
        CI: "true"
    - name: Run Elixir tests
      run: mix test
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ex_gocd_test
        CI: "true"

    - uses: actions/setup-go@v6
      with:
        go-version: '1.26'
    - name: Run Go Agent tests
      run: cd agent && go test ./...

    - name: Publish Elixir Test Results
      uses: dorny/test-reporter@v3
      if: always()
      with:
        name: Elixir Unit Tests
        path: _build/test/lib/ex_gocd/test-junit-report.xml
        reporter: java-junit
        fail-on-error: false

  publish-server:
    name: Build and publish Server Docker image
    runs-on: ubuntu-latest
    needs: build
    # Only run publish on push to main or tags matching v*
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Server
        id: meta-server
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag,pattern=^v[0-9]
            type=ref,event=branch

      - name: Build and push Server Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  publish-agent:
    name: Build and publish Agent Docker image (minimal)
    runs-on: ubuntu-latest
    needs: build
    # Run on push to main/tags, or manual workflow_dispatch
    if: (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Agent
        id: meta-agent
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-agent
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
            type=ref,event=tag,pattern=^v[0-9]
            type=ref,event=tag,pattern=^v[0-9]\\.[0-9]
            type=ref,event=tag,pattern=^v[0-9]\\.[0-9]\\.[0-9]

      - name: Build and push Agent Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./agent
          file: ./agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  publish-agent-variants:
    name: Build and publish Agent Docker image (${{ matrix.variant }})
    runs-on: ubuntu-latest
    needs: build
    # Only on manual workflow_dispatch — these are large (~1GB+) images
    if: github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        variant:
          - standard
          - full

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set extra packages
        id: packages
        run: |
          if [ "${{ matrix.variant }}" = "standard" ]; then
            echo "pkgs=build-essential openssl-dev python3 nodejs npm" >> $GITHUB_OUTPUT
          else
            echo "pkgs=build-essential openssl-dev python3 nodejs npm openjdk21-jdk subversion clang rust cargo dotnet8-sdk" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata (tags, labels) for Agent
        id: meta-agent
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-agent
          tags: |
            type=raw,value=${{ matrix.variant }}

      - name: Build and push Agent Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./agent
          file: ./agent/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
          build-args: |
            EXTRA_PACKAGES=${{ steps.packages.outputs.pkgs }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

  cypress:
    name: Run Cypress E2E Tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      checks: write

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ex_gocd_dev
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: ex_gocd:ci
          # No cache — always clean build for PR validation gate

      - run: npm ci

      - run: bash scripts/run_cypress_ci.sh

      - if: failure()
        run: docker logs ex_gocd_ci

      - uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Cypress E2E Tests
          path: cypress/results/results-*.xml
          reporter: java-junit
          fail-on-error: false

