version: "0.5"

# ── ex_gocd process-compose configuration ───────────────────────────────
# Starts Phoenix server + 3 GoCD agents (CI + Docker + Elastic Docker).
#
# Prerequisites: docker compose up -d postgres jaeger otel-collector
# Usage:         process-compose up
# Stop:          process-compose down
#
# https://f1bonacc1.github.io/process-compose/

log_location: /tmp/ex_gocd_processes.log
log_level: info
is_strict: true

processes:
  # ── Phoenix Server ──────────────────────────────────────────────────
  server:
    command: "mix phx.server"
    working_dir: "."
    environment:
      - "EX_GOCD_DEMO_COOKIE=ex-gocd-demo-cookie"
    readiness_probe:
      http_get:
        host: localhost
        port: 4000
        path: /pipelines
      initial_delay_seconds: 180
      period_seconds: 5
      timeout_seconds: 30
    depends_on: {}
    availability:
      restart: always
      max_restarts: 0

  # ── CI Agent (elixir, postgres resources) ───────────────────────────
  ci-agent:
    command: "go run ."
    working_dir: "agent"
    environment:
      - "AGENT_SERVER_URL=http://localhost:4000"
      - "AGENT_WORK_DIR=/tmp/ex_gocd_agent_work"
      - "AGENT_CI_MODE=1"
      - "AGENT_AUTO_REGISTER_RESOURCES=elixir,postgres"
      - "AGENT_HOSTNAME=ci-agent"
      - "AGENT_UUID=ci-agent-00000000-0000-4000-a000-000000000001"
      - "EX_GOCD_DEMO_COOKIE=ex-gocd-demo-cookie"
      - "OTEL_TRACES_EXPORTER=otlp"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=localhost:4318"
      - "OTEL_SERVICE_NAME=gocd-agent"
    depends_on:
      server:
        condition: process_healthy
    availability:
      restart: always
      max_restarts: 0

  # ── Docker Agent (docker resource, socket mounted) ──────────────────
  docker-agent:
    command: "go run ."
    working_dir: "agent"
    environment:
      - "AGENT_SERVER_URL=http://localhost:4000"
      - "AGENT_WORK_DIR=/tmp/ex_gocd_agent_docker_work"
      - "AGENT_AUTO_REGISTER_RESOURCES=docker"
      - "AGENT_HOSTNAME=docker-agent"
      - "AGENT_UUID=docker-agent-00000000-0000-4000-a000-000000000001"
      - "EX_GOCD_DEMO_COOKIE=ex-gocd-demo-cookie"
      - "OTEL_TRACES_EXPORTER=otlp"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=localhost:4318"
      - "OTEL_SERVICE_NAME=gocd-docker-agent"
    depends_on:
      server:
        condition: process_healthy
    availability:
      restart: always
      max_restarts: 0

  # ── Elastic Docker Agent (self-terminates when idle, Docker socket auto-detected) ──
  # Same Docker access as docker-agent, but registers as elastic (no resources).
  # Exits after 5 min idle; process-compose restarts it so it re-registers.
  elastic-docker-agent:
    command: "go run ."
    working_dir: "agent"
    environment:
      - "AGENT_SERVER_URL=http://localhost:4000"
      - "AGENT_WORK_DIR=/tmp/ex_gocd_agent_docker_elastic_work"
      - "AGENT_AUTO_REGISTER_ELASTIC_AGENT_ID=elastic-docker-001"
      - "AGENT_AUTO_REGISTER_ELASTIC_PLUGIN_ID=cd.go.contrib.elastic-agent.docker"
      - "AGENT_AUTO_REGISTER_RESOURCES="
      - "AGENT_IDLE_TIMEOUT=300s"
      - "AGENT_HOSTNAME=elastic-docker-agent"
      - "AGENT_UUID=elastic-docker-00000000-0000-4000-a000-000000000001"
      - "EX_GOCD_DEMO_COOKIE=ex-gocd-demo-cookie"
      - "OTEL_TRACES_EXPORTER=otlp"
      - "OTEL_EXPORTER_OTLP_ENDPOINT=localhost:4318"
      - "OTEL_SERVICE_NAME=gocd-elastic-docker-agent"
    depends_on:
      server:
        condition: process_healthy
    availability:
      restart: always
      max_restarts: 0
